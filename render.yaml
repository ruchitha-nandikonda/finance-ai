services:
  - type: web
    name: finance-ai-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: CHAT_MODEL
        value: gpt-3.5-turbo
      - key: DB_PATH
        value: ./data/transactions.db
